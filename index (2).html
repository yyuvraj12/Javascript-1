<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎯 Smart Event Dashboard</h1>
    </header>

    <main class="dashboard-container">
        <section class="card-section">
            <h2>Add New Event</h2>
            <form id="eventForm">
                <div class="form-group">
                    <label>Event Title:</label>
                    <input type="text" id="eventTitle" required placeholder="Enter event name">
                </div>
                <div class="form-group">
                    <label>Event Date:</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="eventCategory">
                        <option value="Conference">Conference</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Meetup">Meetup</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="eventDesc" rows="3" placeholder="Brief description..."></textarea>
                </div>
                <button type="submit" id="addEventBtn">Add Event</button>
            </form>
        </section>

        <section class="card-section">
            <div class="section-header">
                <h2>My Events</h2>
                <div class="action-buttons">
                    <button id="clearAllBtn">Clear All Events</button>
                </div>
            </div>
            <div id="eventList" class="event-grid">
                <p id="emptyMsg">No events yet. Add your first event!</p>
            </div>
        </section>

        <section class="card-section full-width">
            <h2>DOM Manipulation Demo</h2>
            <div class="demo-box">
                <p><strong>innerText vs innerHTML vs textContent</strong></p>
                <div id="demoContent" style="display: none;">   <span>   Bold Text   </span> with spaces </div>
                
                <ul class="demo-list">
                    <li><strong>Original HTML:</strong> <code>&lt;span&gt;   Bold Text   &lt;/span&gt; with spaces</code></li>
                    <li id="htmlResult">innerHTML: </li>
                    <li id="textResult">innerText: </li>
                    <li id="contentResult">textContent: </li>
                </ul>
                <button id="runDemoBtn">Run Demo</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
